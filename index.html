<!DOCTYPE html>

<body>
  <nav class="navbar">
    <div class="logo">CarboSense</div>
    <div class="nav-links">
      <a href="accueil.html">Accueil</a>
      <a href="index.html">Calculateur</a>
      <button id="themeToggle">🌙</button>
    </div>
  </nav>
  
<dt><h1>Calculateur d’empreinte carbone ménage</h1></dt>
<dd></dd>

<div class="card">
  <h3>Consommations hebdomataire</h3>
  <input type="number" id="car" placeholder="Km en voiture">
  <input type="number" id="electricity" placeholder="Électricité (kWh)">
  <input type="number" id="gas" placeholder="Gaz (L)">
  <input type="number" id="fuel" placeholder="Fioul (L)">
  <input type="number" id="waste" placeholder="Déchets (kg)">
  <input type="number" id="wood" placeholder="Bois de chauffage (kg)">
  <input type="number" id="charcoal" placeholder="Charbon de bois (kg)">
  <h3>Alimentation (repas / semaine)</h3>
  <input type="number" id="meat" placeholder="Repas avec viande">
  <input type="number" id="veg" placeholder="Repas végétariens">
  <button onclick="calculate()">Calculer</button>
</div>

<div class="card">
  <p id="result"></p>
  <p id="grade"></p>
  <canvas id="barChart" height="200"></canvas>
  <canvas id="pieChart" height="200"></canvas>
  <p id="comparison"></p>
  <div id="tips"></div>
</div>

<script src="script.js"></script>
